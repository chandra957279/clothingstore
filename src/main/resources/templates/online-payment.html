<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Secure Payment</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>

<style>

body{
background:#f1f3f6;
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
}

.payment-card{
max-width:450px;
width:100%;
border-radius:12px;
}

.pay-btn{
font-size:18px;
padding:12px;
border-radius:8px;
}

.secure-text{
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<div class="card shadow payment-card">

<div class="card-body text-center p-4">

<h3 class="mb-3">💳 Secure Payment</h3>

<hr>

<div class="mb-3">

<h6 class="text-muted">Order ID</h6>

<p class="fw-bold" th:text="${order.id}"></p>

</div>

<div class="mb-4">

<h6 class="text-muted">Total Amount</h6>

<h2 class="text-success fw-bold">

₹ <span th:text="${order.totalAmount}"></span>

</h2>

</div>

<button class="btn btn-success w-100 pay-btn" id="payBtn">

Pay Securely

</button>

<div class="mt-3 text-muted secure-text">

🔒 100% Secure Payment | Powered by Razorpay

</div>

</div>

</div>

</div>

<script th:inline="javascript">

document.getElementById("payBtn").onclick = function(){

    var amount = [[${order.totalAmount}]];

    fetch("/create-order?amount=" + amount, {
        method: "POST"
    })
    .then(response => response.json())
    .then(data => {

        var options = {

            key: "rzp_test_SR2jXjG38VpJA3",

            amount: data.amount,

            currency: "INR",

            name: "Clothing Store",

            description: "Order Payment",

            order_id: data.id,

            handler: function (response) {

                alert("Payment Successful!");

                window.location.href="/orders";

            }

        };

        var rzp = new Razorpay(options);

        rzp.open();

    });

};

</script>

</body>
</html>
