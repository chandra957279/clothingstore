<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Order Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="container mt-4">

<h2 class="mb-4">📦 Order Details</h2>

<div class="card mb-4">
<div class="card-body">

<p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>

<p><strong>User ID:</strong> <span th:text="${order.userId}"></span></p>

<p><strong>Status:</strong> <span th:text="${order.status}"></span></p>

<p><strong>Total:</strong> ₹ <span th:text="${order.totalAmount}"></span></p>

</div>
</div>

<h4>Products</h4>

<table class="table table-bordered text-center">

<thead class="table-dark">

<tr>
<th>Image</th>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Subtotal</th>
</tr>

</thead>

<tbody>

<tr th:each="item : ${items}">

<td>
<img th:src="@{${item.product.imageUrl}}"
     width="60">
</td>

<td th:text="${item.product.name}"></td>

<td>₹ <span th:text="${item.price}"></span></td>

<td th:text="${item.quantity}"></td>

<td>₹ <span th:text="${item.price * item.quantity}"></span></td>

</tr>

</tbody>

</table>

<a href="/admin/orders" class="btn btn-dark">
⬅ Back
</a>

</body>
</html>
