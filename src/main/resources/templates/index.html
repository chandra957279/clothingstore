<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

<title>Clothing Store</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

.product-img{
height:220px;
object-fit:cover;
}

.product-title{
font-size:16px;
font-weight:600;
min-height:45px;
}

.description{
display:-webkit-box;
-webkit-line-clamp:2;
-webkit-box-orient:vertical;
overflow:hidden;
}

.card{
border:none;
transition:0.3s;
}

.card:hover{
transform:scale(1.03);
box-shadow:0px 10px 25px rgba(0,0,0,0.15);
}

.category-icon img{
height:80px;
object-fit:cover;
}

footer{
background:#212529;
color:white;
padding:30px 0;
margin-top:50px;
}
.category-icon img{
transition:0.3s;
}

.category-icon img:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark px-4">

<a class="navbar-brand fw-bold" href="/">Clothing Store</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarMenu">

<div class="ms-auto d-flex flex-wrap gap-2">

<a class="btn btn-outline-light btn-sm"
sec:authorize="hasRole('USER')"
href="/cart/view">Cart</a>

<a class="btn btn-outline-light btn-sm"
sec:authorize="hasRole('USER')"
href="/orders">My Orders</a>

<a class="btn btn-warning btn-sm"
sec:authorize="hasRole('ADMIN')"
href="/admin/dashboard">Admin</a>

<a class="btn btn-success btn-sm"
sec:authorize="!isAuthenticated()"
href="/login">Login</a>

<a class="btn btn-danger btn-sm"
sec:authorize="isAuthenticated()"
href="/logout">Logout</a>

</div>

</div>

</nav>

<!-- SLIDER -->

<div id="bannerCarousel" class="carousel slide mb-4" data-bs-ride="carousel">

<div class="carousel-inner">

<div class="carousel-item active">
<img src="https://i.ytimg.com/vi/3iMjJ9TVSEI/maxresdefault.jpg"
class="d-block w-100 img-fluid" style="max-height:350px;object-fit:cover;">
</div>

<div class="carousel-item">
<img src="https://img.freepik.com/free-vector/hand-drawn-fashion-collection-twitch-banner_23-2149985384.jpg"
class="d-block w-100 img-fluid" style="max-height:350px;object-fit:cover;">
</div>

<div class="carousel-item">
<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQC02FmUjs0VrH_KLkOeswoVDNwedl4-wOSow&s"
class="d-block w-100 img-fluid" style="max-height:350px;object-fit:cover;">
</div>

</div>

<button class="carousel-control-prev" type="button" data-bs-target="#bannerCarousel" data-bs-slide="prev">
<span class="carousel-control-prev-icon"></span>
</button>

<button class="carousel-control-next" type="button" data-bs-target="#bannerCarousel" data-bs-slide="next">
<span class="carousel-control-next-icon"></span>
</button>

</div>

<!-- CATEGORY SECTION -->

<div class="container text-center mb-4">

<div class="row category-icon">

<div class="col-6 col-md-3">

<a th:href="@{/?category=T-Shirts}">

<img src="https://www.thewalkdeal.com/cdn/shop/products/Superman.jpg?v=1640673445"
class="img-fluid rounded">

<p class="mt-2 fw-semibold">T-Shirts</p>

</a>

</div>

<div class="col-6 col-md-3">

<a th:href="@{/?category=Shirts}">

<img src="https://zabolo.in/cdn/shop/files/1_4d9e2629-cf2d-4e95-9a80-3a0fb15b72d5.jpg?v=1726569871"
class="img-fluid rounded">

<p class="mt-2 fw-semibold">Shirts</p>

</a>

</div>

<div class="col-6 col-md-3">

<a th:href="@{/?category=Jeans}">

<img src="https://d1pdzcnm6xgxlz.cloudfront.net/bottoms/8905074941230-9.jpg"
class="img-fluid rounded">

<p class="mt-2 fw-semibold">Jeans</p>

</a>

</div>

<div class="col-6 col-md-3">

<a th:href="@{/?category=Kurtas}">

<img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSo6yRI28jPWgHu2Z9HTSpSRhjlNxBelOAg-A&s"
class="img-fluid rounded">

<p class="mt-2 fw-semibold">Kurtas</p>

</a>

</div>

</div>

</div>

<!-- PRODUCTS -->

<div class="container">

<h3 class="fw-bold mb-4">🔥 Trending Products</h3>

<div class="row">

<div class="col-6 col-md-4 col-lg-3 mb-4" th:each="p : ${products}">

<div class="card h-100">

<a th:href="@{/product/{id}(id=${p.id})}">
<img th:src="${p.imageUrl != null} ? @{${p.imageUrl}} : @{/images/default.png}"
class="card-img-top product-img">
</a>

<div class="card-body d-flex flex-column">

<h6 class="product-title">

<a th:href="@{/product/{id}(id=${p.id})}"
class="text-decoration-none text-dark"
th:text="${p.name}">
</a>

</h6>

<p class="text-muted small description"
th:text="${p.description}">
</p>

<h6 class="text-success fw-bold">
₹ <span th:text="${p.price}"></span>
</h6>

<div class="mt-auto">

<form th:action="@{/cart/add}" method="post" sec:authorize="hasRole('USER')">

<input type="hidden" name="productId" th:value="${p.id}"/>

<button class="btn btn-primary w-100 btn-sm"
th:disabled="${p.stock == 0}">
Add to Cart
</button>

</form>

</div>

</div>

</div>

</div>

</div>

</div>

<!-- FOOTER -->

<footer>

<div class="container">

<div class="row text-center text-md-start">

<div class="col-md-4 mb-3">

<h5>Clothing Store</h5>

<p>Your fashion destination for trending styles.</p>

</div>

<div class="col-md-4 mb-3">

<h5>Quick Links</h5>

<ul class="list-unstyled">

<li><a href="/" class="text-white">Home</a></li>
<li><a href="/orders" class="text-white">Orders</a></li>
<li><a href="/cart/view" class="text-white">Cart</a></li>

</ul>

</div>

<div class="col-md-4">

<h5>Contact</h5>

<p>Email: support@clothingstore.com</p>

</div>

</div>

<hr>

<p class="text-center mb-0">© 2026 Clothing Store</p>

</div>

</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
