<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
<title>Clothing Store</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

/* ---------- GLOBAL ---------- */
body{
background:#f1f3f6;
}

/* ---------- CARD ---------- */
.card{
border:none;
border-radius:12px;
overflow:hidden;
transition:0.3s;
background:#fff;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

/* ---------- IMAGE ---------- */
.image-container{
width:100%;
height:250px;
overflow:hidden;
background:#f8f9fa;
display:flex;
align-items:center;
justify-content:center;
}

.card-img-top{
width:100%;
height:100%;
object-fit:cover;
transition:0.3s;
}

.card:hover .card-img-top{
transform:scale(1.05);
}

/* ---------- RESPONSIVE IMAGE ---------- */
@media(max-width:576px){
.image-container{
height:180px;
}
}

@media(min-width:577px) and (max-width:992px){
.image-container{
height:220px;
}
}

@media(min-width:993px){
.image-container{
height:260px;
}
}

/* ---------- TEXT ---------- */
.product-title{
font-size:15px;
font-weight:600;
min-height:40px;
}

.price{
font-weight:700;
color:#388e3c;
}

.old-price{
text-decoration:line-through;
color:#777;
font-size:14px;
}

.discount{
color:red;
font-size:14px;
}

/* ---------- BUTTON ---------- */
.btn-primary{
border-radius:8px;
font-size:14px;
}

/* ---------- NAVBAR ---------- */
.navbar-brand{
font-weight:bold;
font-size:20px;
}

/* ---------- CATEGORY ---------- */
.category-icon img{
height:80px;
object-fit:cover;
transition:0.3s;
border-radius:10px;
}

.category-icon img:hover{
transform:scale(1.1);
}

/* ---------- FOOTER ---------- */
footer{
background:#212529;
color:white;
padding:30px 0;
margin-top:50px;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
<div class="container">

<a class="navbar-brand" href="/">Clothing Store</a>

<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#nav">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="nav">

<ul class="navbar-nav ms-auto gap-2">

<li sec:authorize="!isAuthenticated()">
<a href="/login" class="btn btn-outline-light btn-sm">Login</a>
</li>

<li sec:authorize="!isAuthenticated()">
<a href="/signup" class="btn btn-outline-light btn-sm">Signup</a>
</li>

<li sec:authorize="isAuthenticated()">
<a href="/cart/view" class="btn btn-outline-light btn-sm">🛒 Cart</a>
</li>

<li sec:authorize="isAuthenticated()">
<a href="/orders" class="btn btn-outline-light btn-sm">📦 Orders</a>
</li>

</ul>

</div>
</div>
</nav>

<!-- PRODUCTS -->
<div class="container mt-4">

<h4 class="mb-3 fw-bold">🔥 Trending Products</h4>

<div class="row g-3">

<div class="col-6 col-md-4 col-lg-3" th:each="p : ${products}">

<div class="card h-100">

<a th:href="@{/product/{id}(id=${p.id})}">

<div class="image-container">
<img th:src="${p.imageUrl != null} ? @{${p.imageUrl}} : @{/images/default.png}"
class="card-img-top">
</div>

</a>

<div class="card-body d-flex flex-column">

<h6 class="product-title">
<a th:href="@{/product/{id}(id=${p.id})}"
class="text-dark text-decoration-none"
th:text="${p.name}">
</a>
</h6>

<!-- Rating -->
<div class="mb-1">
<span class="badge bg-success">
<span th:text="${p.rating} ?: 4.2"></span> ⭐
</span>
<span class="text-muted small ms-1">
(<span th:text="${p.reviewCount} ?: 120"></span>)
</span>
</div>

<!-- Price -->
<div>
<span class="price">₹ <span th:text="${p.price}"></span></span>
<span class="old-price ms-2">
₹ <span th:text="${p.originalPrice} ?: ${p.price + 300}"></span>
</span>
<span class="discount ms-1">
<span th:text="${p.discount} ?: 30"></span>% off
</span>
</div>

<!-- Offer -->
<div class="text-success small">
<span th:text="${p.offer} ?: 'Bank Offer Available'"></span>
</div>

<!-- Delivery -->
<div class="text-muted small">
Delivery by <b>21 Mar</b>
</div>

<!-- BUTTON -->
<div class="mt-auto pt-2">

<form th:action="@{/cart/add}" method="post"
sec:authorize="hasRole('USER')">

<input type="hidden" name="productId" th:value="${p.id}"/>

<button class="btn btn-primary w-100"
th:disabled="${p.stock == 0}">
Add to Cart
</button>

</form>

</div>

</div>

</div>

</div>

</div>
</div>

<!-- FOOTER -->
<footer>
<div class="container text-center">
<h5>Clothing Store</h5>
<p>Trendy fashion for everyone</p>
<p>© 2026 All Rights Reserved</p>
</div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
