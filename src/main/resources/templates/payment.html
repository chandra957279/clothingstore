<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Checkout</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8f9fa;
}

.product-img{
height:50px;
width:50px;
object-fit:cover;
border-radius:6px;
}

.payment-card{
border-radius:10px;
}

</style>

</head>

<body>

<div class="container mt-4">

<h2 class="mb-4">🧾 Checkout</h2>

<div class="row g-4">

<!-- ORDER SUMMARY -->

<div class="col-lg-7">

<h4 class="mb-3">Order Summary</h4>

<div class="table-responsive">

<table class="table table-bordered text-center align-middle">

<thead class="table-dark">

<tr>
<th>Product</th>
<th>Price</th>
<th>Qty</th>
<th>Total</th>
</tr>

</thead>

<tbody>

<tr th:each="item : ${items}">

<td>

<div class="d-flex align-items-center gap-2 justify-content-center">

<img th:src="@{${item.product.imageUrl}}" class="product-img">

<span th:text="${item.product.name}"></span>

</div>

</td>

<td>
₹ <span th:text="${item.price}"></span>
</td>

<td th:text="${item.quantity}"></td>

<td>
₹ <span th:text="${item.price * item.quantity}"></span>
</td>

</tr>

</tbody>

</table>

</div>

</div>


<!-- PAYMENT OPTIONS -->

<div class="col-lg-5">

<div class="card shadow payment-card">

<div class="card-body">

<h5 class="card-title mb-3">Payment Method</h5>

<form th:action="@{/payment/process}" method="post">

<input type="hidden" name="orderId" th:value="${order.id}"/>

<div class="form-check">

<input class="form-check-input"
type="radio"
name="method"
value="COD"
checked>

<label class="form-check-label">
Cash On Delivery
</label>

</div>

<div class="form-check mt-2">

<input class="form-check-input"
type="radio"
name="method"
value="ONLINE">

<label class="form-check-label">
Online Payment (Razorpay)
</label>

</div>

<hr>

<h5 class="text-success fw-bold">

Total: ₹
<span th:text="${order.totalAmount}"></span>

</h5>

<button class="btn btn-success w-100 mt-3">
Confirm Payment
</button>

</form>

</div>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
