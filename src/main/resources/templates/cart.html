<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Cart</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8f9fa;
}

.product-img{
height:60px;
width:60px;
object-fit:cover;
border-radius:6px;
}

.qty-btn{
width:30px;
height:30px;
padding:0;
}

</style>

</head>

<body>

<div class="container mt-4">

<h2 class="mb-4">🛒 Your Cart</h2>

<!-- Stock Error -->

<div th:if="${param.error}" class="alert alert-danger">
Insufficient stock for one or more products.
</div>

<!-- Responsive Table -->

<div class="table-responsive">

<table class="table table-bordered table-hover text-center align-middle">

<thead class="table-dark">

<tr>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Subtotal</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr th:each="item : ${cartItems}">

<td>

<div class="d-flex align-items-center gap-2 justify-content-center">

<img th:src="@{${item.product.imageUrl}}"
class="product-img">

<span th:text="${item.product.name}"></span>

</div>

</td>

<td>
₹ <span th:text="${item.product.price}"></span>
</td>

<td>

<a class="btn btn-sm btn-danger qty-btn"
th:href="@{'/cart/decrease/' + ${item.id}}">
-
</a>

<span class="mx-2" th:text="${item.quantity}"></span>

<a class="btn btn-sm btn-success qty-btn"
th:href="@{'/cart/increase/' + ${item.id}}">
+
</a>

</td>

<td>
₹ <span th:text="${item.product.price * item.quantity}"></span>
</td>

<td>

<a class="btn btn-sm btn-warning"
th:href="@{'/cart/remove/' + ${item.id}}">
Remove
</a>

</td>

</tr>

</tbody>

</table>

</div>

<!-- Total -->

<div class="d-flex justify-content-end">

<h4>

Total Amount: ₹
<span th:text="${totalAmount}"></span>

</h4>

</div>

<!-- Checkout -->

<div class="mt-3 d-flex gap-2">

<form th:action="@{/cart/checkout}" method="post">

<button class="btn btn-success">
Place Order
</button>

</form>

<a href="/" class="btn btn-secondary">
Back to Home
</a>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
