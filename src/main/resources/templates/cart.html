<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<title>Cart</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body>

<div class="container mt-4">

<h2 class="mb-4">Your Cart</h2>

<!-- Stock Error -->
<div th:if="${param.error}" class="alert alert-danger">
Insufficient stock for one or more products.
</div>

<table class="table table-bordered table-hover text-center">

<thead class="table-dark">

<tr>
<th>Product</th>
<th>Price</th>
<th>Quantity</th>
<th>Subtotal</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr th:each="item : ${cartItems}">

<td th:text="${item.product.name}"></td>

<td>
₹ <span th:text="${item.product.price}"></span>
</td>

<td>

<a class="btn btn-sm btn-danger"
   th:href="@{'/cart/decrease/' + ${item.id}}">
-
</a>

<span class="mx-2" th:text="${item.quantity}"></span>

<a class="btn btn-sm btn-success"
   th:href="@{'/cart/increase/' + ${item.id}}">
+
</a>

</td>

<td>
₹ <span th:text="${item.product.price * item.quantity}"></span>
</td>

<td>

<a class="btn btn-sm btn-warning"
   th:href="@{'/cart/remove/' + ${item.id}}">
Remove
</a>

</td>

</tr>

</tbody>

</table>

<h4 class="text-end">

Total Amount: ₹
<span th:text="${totalAmount}"></span>

</h4>

<form th:action="@{/cart/checkout}" method="post">

<button class="btn btn-success">
Place Order
</button>

</form>

<a href="/" class="btn btn-secondary mt-3">
Back to Home
</a>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
