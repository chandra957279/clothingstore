<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Product Details</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8f9fa;
}

.product-img{
height:450px;
object-fit:cover;
border-radius:12px;
}

.review-star{
color:gold;
font-size:18px;
}

.review-card{
background:white;
border-radius:10px;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="row g-5">

<!-- ================= PRODUCT IMAGE ================= -->

<div class="col-md-6 text-center">

<img th:src="${product.imageUrl} != null ? ${product.imageUrl} : '/images/default.png'"
     class="img-fluid product-img shadow">

</div>


<!-- ================= PRODUCT DETAILS ================= -->

<div class="col-md-6">

<h2 class="fw-bold" th:text="${product.name}"></h2>

<p class="text-muted mt-3" th:text="${product.description}"></p>

<h3 class="text-success fw-bold mt-3">
₹ <span th:text="${product.price}"></span>
</h3>

<p class="mt-3">
Category :
<span class="badge bg-primary" th:text="${product.category}"></span>
</p>

<p>
Stock :
<span th:text="${product.stock}"
      th:classappend="${product.stock > 0} ? 'text-success fw-bold' : 'text-danger fw-bold'">
</span>
</p>


<!-- ================= ADD TO CART ================= -->

<form th:action="@{/cart/add}" method="post" class="mt-4">

<input type="hidden" name="productId" th:value="${product.id}"/>

<button class="btn btn-primary btn-lg"
        th:disabled="${product.stock == 0}">
Add to Cart
</button>

</form>

<a href="/" class="btn btn-secondary mt-3">
Back to Store
</a>

</div>

</div>


<!-- ================= RATING SECTION ================= -->

<hr class="mt-5">

<h4>⭐ Average Rating</h4>

<h5>
<span th:text="${#numbers.formatDecimal(avgRating,1,1)}"></span> / 5
</h5>


<!-- ================= REVIEW FORM ================= -->

<hr>

<h4>Write a Review</h4>

<form th:action="@{/review/add}" method="post">

<input type="hidden" name="productId" th:value="${product.id}"/>

<div class="mb-3">

<label class="form-label">Rating</label>

<select name="rating" class="form-select">

<option value="5">⭐⭐⭐⭐⭐</option>
<option value="4">⭐⭐⭐⭐</option>
<option value="3">⭐⭐⭐</option>
<option value="2">⭐⭐</option>
<option value="1">⭐</option>

</select>

</div>

<div class="mb-3">

<label class="form-label">Review</label>

<textarea name="comment"
          class="form-control"
          rows="3"
          required></textarea>

</div>

<button class="btn btn-success">
Submit Review
</button>

</form>


<!-- ================= CUSTOMER REVIEWS ================= -->

<hr>

<h4 class="mt-4">Customer Reviews</h4>

<div th:each="r : ${reviews}" class="review-card border p-3 mb-3 shadow-sm">

<strong th:text="${r.userName}"></strong>

<p class="review-star">
<span th:text="${'⭐'.repeat(r.rating)}"></span>
</p>

<p th:text="${r.comment}"></p>

</div>

</div>

</body>
</html>
