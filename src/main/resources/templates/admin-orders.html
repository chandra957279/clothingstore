<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Admin Orders</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f8f9fa;
}

.orders-card{
border-radius:12px;
}

.status-badge{
font-size:13px;
padding:6px 10px;
}

</style>

</head>

<body>

<div class="container mt-4">

<h2 class="mb-4 fw-bold">📦 All Orders</h2>

<div class="card shadow-sm orders-card">

<div class="card-body">

<div class="table-responsive">

<table class="table table-hover text-center align-middle">

<thead class="table-dark">

<tr>
<th>Order ID</th>
<th>User</th>
<th>Total</th>
<th>Status</th>
<th>Date</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr th:each="order : ${orders}">

<td class="fw-bold" th:text="${order.id}"></td>

<td th:text="${order.userId}"></td>

<td>
₹ <span th:text="${order.totalAmount}"></span>
</td>

<!-- STATUS -->

<td>

<span th:if="${order.status != null and order.status.name() == 'PENDING'}"
class="badge bg-warning text-dark status-badge">
PENDING
</span>

<span th:if="${order.status != null and order.status.name() == 'SHIPPED'}"
class="badge bg-info status-badge">
SHIPPED
</span>

<span th:if="${order.status != null and order.status.name() == 'DELIVERED'}"
class="badge bg-success status-badge">
DELIVERED
</span>

<span th:if="${order.status == null}"
class="badge bg-secondary status-badge">
UNKNOWN
</span>

</td>

<td th:text="${#temporals.format(order.orderDate,'dd MMM yyyy HH:mm')}"></td>

<!-- ACTION -->

<td>

<div class="d-flex justify-content-center flex-wrap gap-1">

<a th:if="${order.status != null and order.status.name() == 'PENDING'}"
th:href="@{'/admin/order/ship/' + ${order.id}}"
class="btn btn-sm btn-primary">
Ship
</a>

<a th:if="${order.status != null and order.status.name() == 'SHIPPED'}"
th:href="@{'/admin/order/deliver/' + ${order.id}}"
class="btn btn-sm btn-success">
Deliver
</a>

<span th:if="${order.status != null and order.status.name() == 'DELIVERED'}"
class="text-success fw-bold">
Completed
</span>

<a th:href="@{'/admin/order/' + ${order.id}}"
class="btn btn-sm btn-dark">
View
</a>

</div>

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
