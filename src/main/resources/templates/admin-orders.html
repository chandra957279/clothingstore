<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>Admin Orders</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<h2 class="mb-4 fw-bold">📦 All Orders</h2>

<div class="card shadow">

<div class="card-body">

<table class="table table-hover text-center">

<thead class="table-dark">

<tr>
<th>Order ID</th>
<th>User</th>
<th>Total</th>
<th>Status</th>
<th>Date</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr th:each="order : ${orders}">

<td th:text="${order.id}"></td>

<td th:text="${order.userId}"></td>

<td>₹ <span th:text="${order.totalAmount}"></span></td>

<!-- STATUS COLUMN -->
<td>

<span th:if="${order.status != null and order.status.name() == 'PENDING'}"
      class="badge bg-warning text-dark">
PENDING
</span>

<span th:if="${order.status != null and order.status.name() == 'SHIPPED'}"
      class="badge bg-info">
SHIPPED
</span>

<span th:if="${order.status != null and order.status.name() == 'DELIVERED'}"
      class="badge bg-success">
DELIVERED
</span>

<span th:if="${order.status == null}"
      class="badge bg-secondary">
UNKNOWN
</span>

</td>

<td th:text="${#temporals.format(order.orderDate,'dd MMM yyyy HH:mm')}"></td>

<!-- ACTION COLUMN -->
<td>

<a th:if="${order.status != null and order.status.name() == 'PENDING'}"
   th:href="@{'/admin/order/ship/' + ${order.id}}"
   class="btn btn-sm btn-primary me-1">
Ship
</a>

<a th:if="${order.status != null and order.status.name() == 'SHIPPED'}"
   th:href="@{'/admin/order/deliver/' + ${order.id}}"
   class="btn btn-sm btn-success me-1">
Deliver
</a>

<span th:if="${order.status != null and order.status.name() == 'DELIVERED'}"
      class="text-success fw-bold me-2">
Completed
</span>

<a th:href="@{'/admin/order/' + ${order.id}}"
   class="btn btn-sm btn-dark">
View
</a>

</td>

</tr>

</tbody>

</table>

</div>
</div>

</div>

</body>
</html>
