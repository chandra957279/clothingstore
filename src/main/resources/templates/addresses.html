<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Saved Addresses</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f3f6;
}

.address-card{
border-radius:10px;
}

</style>

</head>

<body>

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<h3>📍 Saved Addresses</h3>

<a href="/" class="btn btn-outline-dark btn-sm">
⬅ Back to Home
</a>

</div>

<div class="row g-3">

<div class="col-lg-6 col-md-6 col-sm-12">

<div class="card shadow-sm address-card">

<div class="card-body">

<h6 th:text="${user.name}"></h6>

<p class="mb-1" th:text="${user.addressLine1}"></p>
<p class="mb-1" th:text="${user.addressLine2}"></p>

<p class="mb-1">
<span th:text="${user.city}"></span>,
<span th:text="${user.state}"></span>
</p>

<p>
Pincode: <span th:text="${user.pincode}"></span>
</p>

<p>
Mobile: <span th:text="${user.mobileNumber}"></span>
</p>

<a href="/profile" class="btn btn-sm btn-primary">
Edit Address
</a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
