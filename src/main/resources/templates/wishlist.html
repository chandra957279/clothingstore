<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

<title>My Wishlist</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body{
background:#f1f3f6;
}

.product-card{
border-radius:10px;
}

.product-img{
height:150px;
object-fit:cover;
}
</style>

</head>

<body>

<div class="container mt-4">

<div class="d-flex justify-content-between align-items-center mb-4">

<h3>❤ My Wishlist</h3>

<a href="/" class="btn btn-outline-dark btn-sm">
⬅ Back to Home
</a>

</div>

<div class="row g-3">

<div class="col-lg-3 col-md-4 col-sm-6" th:each="product : ${wishlist}">

<div class="card shadow-sm product-card">

<img th:src="${product.imageUrl}" class="card-img-top product-img">

<div class="card-body text-center">

<h6 th:text="${product.name}"></h6>

<p class="text-success fw-bold">
₹ <span th:text="${product.price}"></span>
</p>

<a th:href="@{'/cart/add/' + ${product.id}}" class="btn btn-primary btn-sm">
Add to Cart
</a>

</div>

</div>

</div>

</div>

</div>

</body>
</html>
