<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Order Details</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<h2>Order Details</h2>

<p><strong>Order ID:</strong> <span th:text="${order.id}"></span></p>
<p><strong>Date:</strong> <span th:text="${order.orderDate}"></span></p>
<p><strong>Total:</strong> ₹ <span th:text="${order.totalAmount}"></span></p>

<h3>Products</h3>

<table class="table table-bordered text-center">

<thead class="table-dark">
<tr>
<th>Product_Id</th>
<th>Image</th>
<th>Price</th>
<th>Quantity</th>
<th>Total</th>
</tr>
</thead>

<tbody>

<tr th:each="item : ${items}">

<td th:text="${item.product.name}"></td>

<td>
<img th:src="@{${item.product.imageUrl}}"
width="80">
</td>

<td>
₹ <span th:text="${item.price}"></span>
</td>

<td th:text="${item.quantity}"></td>

<td>
₹ <span th:text="${item.price * item.quantity}"></span>
</td>

</tr>

</tbody>

</table>

<br>
<a href="/orders">Back to Orders</a>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
