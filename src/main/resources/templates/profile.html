<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<title>My Account</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f1f3f6;
}

.sidebar{
background:white;
border-radius:8px;
}

.profile-card{
background:white;
border-radius:8px;
}

.menu-item{
padding:12px;
border-bottom:1px solid #eee;
cursor:pointer;
}

.menu-item:hover{
background:#f5f5f5;
}

.section-title{
font-weight:600;
margin-bottom:15px;
}

</style>

</head>

<body>
<div class="d-flex flex-wrap justify-content-between align-items-center mb-3">

<h3 class="fw-bold mb-2">My Profile</h3>

<a href="/" class="btn btn-outline-dark btn-sm">
⬅ Back to Home
</a>

</div>

<div class="container mt-4">

<div class="row g-3">

<!-- SIDEBAR -->

<div class="col-lg-3 col-md-4">

<div class="sidebar shadow-sm">

<div class="p-3 border-bottom">

<h5 class="mb-0">Hello,</h5>
<strong th:text="${user.name}"></strong>

</div>

<div class="menu-item">
<a href="/profile" class="text-decoration-none text-dark">
👤 My Profile
</a>
</div>

<div class="menu-item">
<a href="/orders" class="text-decoration-none text-dark">
📦 My Orders
</a>
</div>

<div class="menu-item">
<a href="/cart/view" class="text-decoration-none text-dark">
🛒 My Cart
</a>
</div>

<div class="menu-item">
<a href="/logout" class="text-decoration-none text-danger">
Logout
</a>
</div>



</div>

</div>



<!-- MAIN PROFILE -->

<div class="col-lg-9 col-md-8">

<div class="profile-card shadow-sm p-4">

<h4 class="mb-4">Personal Information</h4>

<div th:if="${param.addressRequired}" class="alert alert-warning">

Please add your delivery address before placing order.

</div>

<form th:action="@{/profile/update}" method="post" th:object="${user}">

<div class="row">

<div class="col-md-6 mb-3">

<label>Name</label>

<input type="text"
class="form-control"
th:value="${user.name}"
readonly>

</div>

<div class="col-md-6 mb-3">

<label>Email</label>

<input type="email"
class="form-control"
th:value="${user.email}"
readonly>

</div>

<div class="col-md-6 mb-3">

<label>Mobile Number</label>

<input type="text"
class="form-control"
th:field="*{mobileNumber}"
maxlength="10"
pattern="[0-9]{10}"
placeholder="Enter 10 digit mobile number">

</div>

</div>

<hr class="my-4">

<h5 class="section-title">Delivery Address</h5>

<div class="mb-3">

<label>Address Line 1</label>

<input type="text"
class="form-control"
th:field="*{addressLine1}">

</div>

<div class="mb-3">

<label>Address Line 2</label>

<input type="text"
class="form-control"
th:field="*{addressLine2}">

</div>

<div class="row">

<div class="col-md-4 mb-3">

<label>City</label>

<input type="text"
class="form-control"
th:field="*{city}">

</div>

<div class="col-md-4 mb-3">

<label>State</label>

<input type="text"
class="form-control"
th:field="*{state}">

</div>

<div class="col-md-4 mb-3">

<label>Pincode</label>

<input type="text"
class="form-control"
th:field="*{pincode}">

</div>

</div>

<button class="btn btn-primary mt-3">
Save Details
</button>

</form>

</div>

</div>

</div>

</div>

</body>
</html>
