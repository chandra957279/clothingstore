<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container-fluid">

<a class="navbar-brand fw-bold" href="/admin/dashboard">
Admin Panel
</a>

<div class="collapse navbar-collapse">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link btn btn-outline-light me-2 px-3"
   th:href="@{/admin/dashboard}">
Home
</a>
</li>

<li class="nav-item">
<a class="nav-link btn btn-outline-light me-2 px-3"
   th:href="@{/admin/orders}">
View All Orders
</a>
</li>

<li class="nav-item">
<a class="nav-link btn btn-danger text-white px-3"
   th:href="@{/logout}">
Logout
</a>
</li>

</ul>

</div>
</div>
</nav>

<div class="container mt-4">

    <h2 class="mb-4">Add Product</h2>

    <!-- Add Product Form -->
    <div class="card shadow mb-5">
        <div class="card-body">
            <form th:action="@{/admin/add-product}" 
      th:object="${product}" 
      method="post" 
      enctype="multipart/form-data">

<div class="row">

<div class="col-md-6 mb-3">
<label>Name</label>
<input type="text" th:field="*{name}" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Category</label>
<input type="text" th:field="*{category}" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Price</label>
<input type="number" step="0.01" th:field="*{price}" class="form-control" required>
</div>

<div class="col-md-6 mb-3">
<label>Stock</label>
<input type="number" th:field="*{stock}" class="form-control" required>
</div>

<div class="col-md-12 mb-3">
<label>Description</label>
<input type="text" th:field="*{description}" class="form-control">
</div>

<div class="col-md-12 mb-3">
<label>Product Image</label>
<input type="file" name="image" class="form-control">
</div>

</div>

<button class="btn btn-success">Add Product</button>

</form>
        </div>
    </div>

    <!-- Product List -->
    <h2 class="mb-3">All Products</h2>

    <table class="table table-bordered table-striped table-hover text-center">
        <thead class="table-dark">
        <tr>
            <th>Name</th>
            <th>Price</th>
            <th>Category</th>
            <th>Stock</th>
            <th>Action</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="p : ${products}">
            <td th:text="${p.name}"></td>
            <td>₹ <span th:text="${p.price}"></span></td>
            <td th:text="${p.category}"></td>
            <td th:text="${p.stock}"></td>
            <td>
                <a class="btn btn-sm btn-danger"
                   th:href="@{'/admin/delete/' + ${p.id}}">
                    Delete
                </a>
            </td>
        </tr>
        </tbody>
    </table>

</div>

</body>
</html>
