<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<title>Admin Dashboard</title>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#f5f6fa;
}

.card{
border:none;
border-radius:10px;
}

.table th, .table td{
vertical-align:middle;
}

</style>

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<div class="container">

<a class="navbar-brand fw-bold" href="/admin/dashboard">
Admin Panel
</a>

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="navbarMenu">

<ul class="navbar-nav ms-auto">

<li class="nav-item">
<a class="nav-link btn btn-outline-light me-2 px-3"
th:href="@{/admin/dashboard}">
Home
</a>
</li>

<li class="nav-item">
<a class="nav-link btn btn-outline-light me-2 px-3"
th:href="@{/admin/orders}">
View Orders
</a>
</li>

<li class="nav-item">
<a class="nav-link btn btn-danger text-white px-3"
th:href="@{/logout}">
Logout
</a>
</li>

</ul>

</div>

</div>

</nav>


<div class="container mt-4">

<h3 class="mb-4 fw-bold">Add Product</h3>

<!-- ADD PRODUCT FORM -->

<div class="card shadow mb-5">

<div class="card-body">

<form th:action="@{/admin/add-product}"
th:object="${product}"
method="post"
enctype="multipart/form-data">

<div class="row g-3">

<div class="col-12 col-md-6">
<label class="form-label">Name</label>
<input type="text" th:field="*{name}" class="form-control" required>
</div>

<div class="col-12 col-md-6">
<label class="form-label">Category</label>
<input type="text" th:field="*{category}" class="form-control" required>
</div>

<div class="col-12 col-md-6">
<label class="form-label">Price</label>
<input type="number" step="0.01" th:field="*{price}" class="form-control" required>
</div>

<div class="col-12 col-md-6">
<label class="form-label">Stock</label>
<input type="number" th:field="*{stock}" class="form-control" required>
</div>

<div class="col-12">
<label class="form-label">Description</label>
<input type="text" th:field="*{description}" class="form-control">
</div>

<div class="col-12">
<label class="form-label">Product Image</label>
<input type="file" name="image" class="form-control">
</div>

</div>

<button class="btn btn-success mt-3">
Add Product
</button>

</form>

</div>

</div>


<!-- PRODUCT LIST -->

<h3 class="mb-3 fw-bold">All Products</h3>

<div class="table-responsive">

<table class="table table-bordered table-striped table-hover text-center">

<thead class="table-dark">

<tr>
<th>Name</th>
<th>Price</th>
<th>Category</th>
<th>Stock</th>
<th>Action</th>
</tr>

</thead>

<tbody>

<tr th:each="p : ${products}">

<td th:text="${p.name}"></td>

<td>
₹ <span th:text="${p.price}"></span>
</td>

<td th:text="${p.category}"></td>

<td th:text="${p.stock}"></td>

<td>

<a class="btn btn-sm btn-danger"
th:href="@{'/admin/delete/' + ${p.id}}">
Delete
</a>

</td>

</tr>

</tbody>

</table>

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
